# Azure DevOps pipeline — validate and deploy Terraform (dev → staging)
trigger:
  branches:
    include:
      - main
      - feature/*
  paths:
    include:
      - dev/*
      - staging/*
      - modules/*
      - pipeline/*

variables:
  - group: terraform-secrets

stages:
  - stage: Validate
    jobs:
      - job: terraform_validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@0
            inputs:
              terraformVersion: 1.9.8

          - task: TerraformTaskV4@4
            displayName: Terraform init (dev)
            inputs:
              provider: azurerm
              command: init
              workingDirectory: $(System.DefaultWorkingDirectory)/dev
              backendServiceArm: Azure-Service-Connection
              backendAzureRmResourceGroupName: terraform-state-rg
              backendAzureRmStorageAccountName: tfdevbackend2024piyush
              backendAzureRmContainerName: tfstate
              backendAzureRmKey: dev.tfstate

          - task: TerraformTaskV4@4
            displayName: Terraform validate (dev)
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(System.DefaultWorkingDirectory)/dev

  - stage: Dev_Deploy
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: terraform_apply_dev
        environment: dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@0
                  inputs:
                    terraformVersion: 1.9.8

                - task: TerraformTaskV4@4
                  displayName: Terraform init (dev)
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: $(System.DefaultWorkingDirectory)/dev
                    backendServiceArm: Azure-Service-Connection
                    backendAzureRmResourceGroupName: terraform-state-rg
                    backendAzureRmStorageAccountName: tfdevbackend2024piyush
                    backendAzureRmContainerName: tfstate
                    backendAzureRmKey: dev.tfstate

                - task: TerraformTaskV4@4
                  displayName: Terraform apply (dev)
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: $(System.DefaultWorkingDirectory)/dev
                    environmentServiceNameAzureRM: Azure-Service-Connection

  - stage: Staging_Deploy
    dependsOn: Dev_Deploy
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: terraform_apply_staging
        environment: staging
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@0
                  inputs:
                    terraformVersion: 1.9.8

                - task: TerraformTaskV4@4
                  displayName: Terraform init (staging)
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: $(System.DefaultWorkingDirectory)/staging
                    backendServiceArm: Azure-Service-Connection
                    backendAzureRmResourceGroupName: terraform-state-rg
                    backendAzureRmStorageAccountName: tfstagebackend2024piyush
                    backendAzureRmContainerName: tfstate
                    backendAzureRmKey: stage.tfstate

                - task: TerraformTaskV4@4
                  displayName: Terraform apply (staging)
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: $(System.DefaultWorkingDirectory)/staging
                    environmentServiceNameAzureRM: Azure-Service-Connection
